name: CI pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: chekout code
      uses: actions/checkout@v5

    - name: set up nodejs
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: install dependencies
      uses: npm ci

    - name: run tests
      run: npm test